<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="login.css">
    <script src="https://kit.fontawesome.com/b604c6e277.js" crossorigin="anonymous"></script>
    <title>login</title>
</head>
<body>
        <div class="bg-img">
            <div class="content">
                <header>
                    <p>Mega<span>Apps</span></p>
                    <div class="img">
                        <img class="img-icon" src="images/de2ered-763ebc79-ce0b-47b7-8b7e-590b73f2f3a6.png" alt="">
                    </div>
                </header>
                <form action="https://www.google.com">
                    <div class="field">
                        <i class="fa fa-user"></i>
                        <input type="email" id="email" required placeholder="Enter Email"/>
                    </div>
                    <div class="field space">
                        <i class="fa fa-lock"></i>
                        <input type="password" class="pass-key" id="password" required placeholder="Password"/>
                        <i class="fa-solid fa-eye show"></i>
                    </div>
                    <div class="pass">
                        <a href="#" id="recover-pass-password">Esqueceu a senha?</a>
                    </div>
                    <div class="field">
                        <input type="submit" value="LOGIN">
                    </div>
                    <div class="pass-creat-account">
                        <h3>Não tem uma conta? <a href="#">Inscreva-se</a></h3>
                    </div>
                    <div class="wrap-icons">
                        <a href="https://pt-br.facebook.com/"><i class="fa-brands fa-facebook-square icon face"></i></a>
                        <a href="https://www.google.com"><i class="fa-brands fa-google icon googl"></i></a>
                        <a href="https://twitter.com/i/flow/login?input_flow_data=%7B%22requested_variant%22%3A%22eyJsYW5nIjoicHQifQ%3D%3D%22%7D"><i class="fa-brands fa-twitter-square icon twit"></i></a>
                        <a href="https://www.twitch.tv/"><i class="fa-brands fa-twitch icon twig"></i></a>
                    </div>
                </form>
            </div>
        </div>
    <script src="script.js"></script>
</body>
</html>
